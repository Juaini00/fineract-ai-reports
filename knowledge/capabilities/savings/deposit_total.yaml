id: savings_deposit_total
status: approved_mvp
domain: savings
data_areas:
  - organization_foundation
  - client_foundation
  - savings_core
  - savings_transactions
required_api_capability: savings_deposit_total
query_id: savings.deposit_total
metrics:
  - savings.deposit_amount
  - savings.deposit_count
output_mode: total
examples:
  - What is the total deposit this month?
  - Total deposits from January to September 2026.
  - How much savings deposit did we receive today?
required_parameters:
  - from_date
  - to_date
optional_parameters:
  - office_ids
  - currency_code
  - product_ids
defaults:
  exclude_reversed: true
guards:
  require_office_scope: true
  max_date_range_days: 366
pii:
  returns_pii: false
cost_class: low
clarification:
  missing_parameters:
    - from_date
    - to_date
