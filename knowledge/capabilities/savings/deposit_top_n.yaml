id: savings_deposit_top_n
status: approved_mvp
domain: savings
data_areas:
  - organization_foundation
  - client_foundation
  - savings_core
  - savings_transactions
required_api_capability: savings_deposit_top_n
query_id: savings.deposit_top_n
metrics:
  - savings.deposit_amount
output_mode: top_n
examples:
  - Who made the largest deposit today?
  - Show the largest deposits this month.
  - Top 10 savings deposits this week.
required_parameters:
  - from_date
  - to_date
  - limit
optional_parameters:
  - office_ids
  - currency_code
  - product_ids
defaults:
  exclude_reversed: true
guards:
  require_office_scope: true
  max_date_range_days: 366
  max_limit: 100
pii:
  returns_pii: conditional
  allowed_fields_when_can_view_pii:
    - client_id
    - client_display_name
cost_class: medium
clarification:
  missing_parameters:
    - from_date
    - to_date
    - limit
